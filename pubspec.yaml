name: Sentence
description: "Creativity, yours." 
publish_to: 'none'

version: 0.8.7-beta

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  path: ^1.9.0
  image_picker: ^1.0.7
  file_picker: ^8.0.0
  fleather: ^1.10.0
  parchment: ^1.10.0
  animations: ^2.0.11
  dynamic_color: ^1.7.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3
  url_launcher: ^6.2.5
  share_plus: ^10.1.4
  path_provider: ^2.1.3
  intl: ^0.20.2
  flutter_staggered_grid_view: ^0.7.0
  open_filex: ^4.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/ic_launcher.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/ic_launcher.png"

flutter:
  uses-material-design: true
  assets:
    - assets/ic_launcher.png

